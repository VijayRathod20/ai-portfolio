<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  <!-- Decorative orbs -->
  <circle cx="200" cy="150" r="150" fill="#818cf8" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1000" cy="480" r="200" fill="#a78bfa" opacity="0.06" filter="url(#glow)"/>
  <circle cx="600" cy="400" r="120" fill="#f472b6" opacity="0.05" filter="url(#glow)"/>
  <!-- Name -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="url(#accent)">Vijay Rathod</text>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">Full Stack Developer &amp; Agentic AI Engineer</text>
  <!-- Divider -->
  <rect x="500" y="360" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Tech stack -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">Next.js · React · TypeScript · Google Gemini · MERN Stack</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="20" fill="#818cf8" opacity="0.7">vijayrathod.dev</text>
  <!-- Status badge -->
  <rect x="490" y="470" width="220" height="36" rx="18" fill="#818cf8" opacity="0.15"/>
  <circle cx="515" cy="488" r="5" fill="#22c55e"/>
  <text x="530" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Available for opportunities</text>
</svg>
